{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BelAfriGo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="{% static 'img/favi.ico' %}" type="image/x-icon">
</head>
<body>

<div class="vh-100 d-flex flex-column justify-content-center align-items-center text-center" 
     style="background: linear-gradient(135deg, #201c1b, #eecb04,  #eb0a0a);">

    <img src="{% static 'img/logo.png' %}" alt="BelAfriGo Logo" style="max-width: 300px;">

    <h1 class="text-black display-4 fw-bold mb-2" id="title">Bienvenue sur BelAfriGo</h1>
    <p class="text-black lead mb-5">Votre plateforme pour client, coiffeuse et taxi</p>

    <div class="row justify-content-center g-4">

        <div class="col-md-4">
            <div class="card shadow-lg border-0 hover-scale" id="register-card">
                <div class="card-body">
                    <h4 class="card-title mb-3">Inscription</h4>
                    <p class="card-text">Créez un compte et choisissez votre rôle</p>
                    <a href="{% url 'register' %}" class="btn btn-primary w-100 btn-lg">Créer un compte</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-lg border-0 hover-scale" id="login-card">
                <div class="card-body">
                    <h4 class="card-title mb-3">Connexion</h4>
                    <p class="card-text">Connectez-vous pour accéder à votre dashboard</p>
                    <a href="{% url 'login' %}" class="btn btn-success w-100 btn-lg">Se connecter</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/home.js' %}"></script>
</body>
</html>

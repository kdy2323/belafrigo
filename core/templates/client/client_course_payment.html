{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Course - BelAfriGo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center mt-5">
    <h2 class="mt-3 mb-4">Paiement de la course</h2>

    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <div id="sumup-card"></div>
        </div>
    </div>
</div>

<script src="https://gateway.sumup.com/gateway/ecom/card/v2/sdk.js"></script>
<script>
  const checkoutId = "{{ checkout_id }}";

  SumUpCard.mount({
    id: "sumup-card",
    checkoutId: checkoutId,
    onResponse: function(type, body) {
        console.log("Type:", type, "Body:", body);

        if(type === "success") {
            window.location.href = "/client/course/payment/callback/?checkout_id=" + checkoutId;
        } else if(type === "error") {
            alert("Erreur paiement : " + (body.message || "Problème inconnu"));
        }
    }
  });
</script>

</body>
</html>

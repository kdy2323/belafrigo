{% extends 'client/base_client.html' %}

{% block title %}Commander un Taxi - BelAfriGo{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <h2 class="fw-bold text-center mb-4">🚕 Commander un Taxi</h2>
                    <p class="text-muted text-center mb-4">
                        Remplissez les informations ci-dessous pour réserver votre taxi.
                    </p>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label" for="id_adresse_depart">Adresse de départ</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="adresse_depart" 
                                id="id_adresse_depart"
                                placeholder="Ex: Avenue des Guerites 867, 7000 Mons"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="id_adresse_arrivee">Adresse d'arrivée</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="adresse_arrivee" 
                                id="id_adresse_arrivee"
                                placeholder="Ex: Rue de Guerre 867, 7012 Jemappes"
                                required
                            >
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            Valider la course
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}

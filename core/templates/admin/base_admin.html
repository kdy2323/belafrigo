{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BelAfriGo Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="{% static 'img/favi.ico' %}" type="image/x-icon">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <img src="{% static 'img/logo.png' %}" alt="BelAfriGo" width="30" height="30" class="d-inline-block align-text-top">
    <div class="d-flex align-items-center">
      <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Déconnexion</a>
    </div>
  </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 bg-light vh-100 p-3 border-end">
            <h5 class="fw-bold mb-3">Menu Admin</h5>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active fw-bold{% endif %}" href="{% url 'admin_dashboard' %}">
                        🏠 Dashboard
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Content -->
        <main class="col-md-9 col-lg-10 py-4">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends 'taxi/base_taxi.html' %}

{% block title %}Paiement Taxi - BelAfriGo{% endblock %}

{% block content %}
<div class="text-center mt-4">
    <img src="{% static 'img/logo.png' %}" alt="BelAfriGo Logo" style="height: 80px;">
    <h2 class="mt-3 mb-4">Inscription Taxi - Paiement 5€</h2>

    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <p>Veuillez effectuer votre paiement pour compléter l’inscription.</p>
            <div id="sumup-card"></div>
        </div>
    </div>
</div>

<!-- SumUp Card Widget v2 -->
<script src="https://gateway.sumup.com/gateway/ecom/card/v2/sdk.js"></script>
<script>
  const checkoutId = "{{ checkout_id }}";  // passé par la view Django

  SumUpCard.mount({
    id: "sumup-card",         // l'ID du div où afficher le widget
    checkoutId: checkoutId,   // l'ID de ton checkout créé via API
    onResponse: function(type, body) {
        console.log("Type:", type);
        console.log("Body:", body);

        if(type === "success") {
            // Paiement réussi → rediriger vers callback Django
            window.location.href = "{% url 'taxi_payment_callback' %}?checkout_id=" + checkoutId;
        } else if(type === "error") {
            alert("Erreur paiement : " + (body.message || "Problème inconnu"));
        }
    }
  });
</script>
{% endblock %}

{% extends 'coiffeuse/base_coiffeuse.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

                <h3 class="fw-bold mb-4">
                    <i class="bi bi-globe2 text-danger me-2"></i>
                    Mes Prestations & Présence en ligne
                </h3>

                <form method="post">
                    {% csrf_token %}

                    <!-- Instagram -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-instagram text-danger me-2"></i>
                            Lien Instagram
                        </label>
                        {{ form.instagram_link }}
                        <div class="form-text">
                            Ajoutez votre profil pour attirer plus de clientes.
                        </div>
                    </div>

                    <!-- Site web / TikTok -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-tiktok text-danger me-2"></i>
                            Lien Site Web ou TikTok
                        </label>
                        {{ form.website_or_tiktok_link }}
                    </div>

                    <!-- Création site -->
                    <div class="form-check form-switch mb-4">
                        {{ form.wants_website }}
                        <label class="form-check-label fw-semibold">
                            <i class="bi bi-laptop text-danger me-2"></i>
                            Je veux créer mon site web professionnel
                        </label>
                    </div>

                    <!-- Boutons -->
                    <div class="d-flex justify-content-end mt-4">
                        <a href="{% url 'coiffeuse_dashboard' %}" 
                           class="btn btn-outline-secondary rounded-pill me-2">
                            Annuler
                        </a>

                        <button type="submit" 
                                class="btn btn-danger rounded-pill px-4">
                            <i class="bi bi-check-circle me-1"></i>
                            Enregistrer
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
